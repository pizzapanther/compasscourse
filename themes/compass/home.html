{% extends "compass/base.html" %}{% load pubcrank %}
{% block content %}
<div class="wrapper">
  <h1>{{ page.title }}</h1>
  <h2>Episodes</h2>
  <ul>
    {% for entry in pagination.object_list %}
    <li>
      <a href="https://compasscourse.life{% page_url entry %}">
        {{ entry.metadata.title }}
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
